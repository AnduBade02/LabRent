# Test configuration: in-memory H2, no real mail server, fixed JWT secret.

spring.datasource.url=jdbc:h2:mem:labrent-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=

app.jwt.secret=test-secret-key-for-junit-only-must-be-long-enough-for-hmac-sha-256!!
app.jwt.expiration-ms=3600000
app.name=LabRent
app.prioritization.strategy=weightedScoring
