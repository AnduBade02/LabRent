# ============================================
# LabRent Application Configuration
# ============================================

# --- Server ---
server.port=8080

# --- Database (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/labrent?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
# "update" auto-creates/updates tables based on entity classes — good for development
# In production, use "validate" or Flyway/Liquibase migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
# Disable caching during development so template changes are picked up immediately
spring.thymeleaf.cache=false

# --- Mail (configure with your SMTP server) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:labrent-dev-secret-key-change-in-production-min-256-bits-long!!}
app.jwt.expiration-ms=86400000

# --- Application ---
app.name=LabRent
