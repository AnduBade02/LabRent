# H2 in-memory database profile — for development without PostgreSQL/Docker
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=h2
spring.datasource.url=jdbc:h2:mem:labrent;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console — access at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
